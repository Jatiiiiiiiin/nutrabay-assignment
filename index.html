    <!-- Node.js Polyfills for Browser -->
    <script type="module">
        import { Buffer } from 'buffer';
        import process from 'process';
        window.Buffer = Buffer;

        // CRITICAL: Preserve existing process.env (where the API_KEY lives)
        // before overwriting window.process with the polyfill.
        const existingEnv = window.process?.env || {};
        window.process = process;
        window.process.env = {
            ...process.env,
            ...existingEnv,
            NODE_ENV: 'production'
        };
        window.process.browser = true;
        window.process.version = '';
        window.process.nextTick = (cb) => setTimeout(cb, 0);
    </script>
